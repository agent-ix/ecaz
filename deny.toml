[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "allow"
wildcards = "warn"

[advisories]
version = 2
ignore = [
    # Via dev-only iai-callgrind. bincode 1.3.3 is complete but unmaintained.
    "RUSTSEC-2025-0141",
    # Via pgrx-tests/parquet. No patched paste release exists; track upstream dependency movement.
    "RUSTSEC-2024-0436",
    # Via pgrx. No patched serde_cbor release exists; track upstream pgrx dependency movement.
    "RUSTSEC-2021-0127",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
