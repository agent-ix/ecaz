name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust Checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets --no-default-features --features pg18,bench -- -D warnings

      - name: Unit tests
        run: cargo test

      - name: Layout assertions
        run: cargo test --features bench --test size_of_assertions

      - name: Property tests
        run: cargo test --features bench --test proptest_quant --test proptest_page -- --test-threads=1
        env:
          PROPTEST_CASES: 256

      - name: Unsafe audit
        run: bash scripts/check_unsafe_comments.sh

  pgrx-pg18:
    name: pgrx pg18
    runs-on: ubuntu-24.04
    env:
      PGRX_HOME: /tmp/tqvector_pgrx_home
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-18 postgresql-server-dev-17 clang llvm pkg-config libssl-dev

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Initialize pgrx for pg18 and pg17
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config --pg17 /usr/lib/postgresql/17/bin/pg_config

      - name: pg18 tests
        run: cargo pgrx test pg18

  spire-stage-e-subset:
    name: SPIRE Stage E subset (${{ matrix.case }})
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    env:
      PGRX_HOME: /tmp/tqvector_pgrx_home
    strategy:
      fail-fast: false
      matrix:
        case:
          - remote_statement_timeout
          - local_cancel
          - epoch_mismatch
          - version_skew
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect SPIRE surface changes
        id: changes
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > /tmp/changed-files
          if grep -Eq '^(src/am/ec_spire/|sql/|scripts/run_spire_multicluster_.*\.sh)' /tmp/changed-files; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        if: steps.changes.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        if: steps.changes.outputs.run == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL build dependencies
        if: steps.changes.outputs.run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-18 postgresql-server-dev-17 clang llvm pkg-config libssl-dev

      - name: Install cargo-pgrx
        if: steps.changes.outputs.run == 'true'
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Initialize pgrx for pg18 and pg17
        if: steps.changes.outputs.run == 'true'
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config --pg17 /usr/lib/postgresql/17/bin/pg_config

      - name: Build ecaz CLI
        if: steps.changes.outputs.run == 'true'
        run: cargo build -p ecaz-cli

      - name: Run Stage E fault subset case
        if: steps.changes.outputs.run == 'true'
        run: |
          target/debug/ecaz dev spire-multicluster fault-pg18 \
            --case "${{ matrix.case }}" \
            --artifact-dir "target/spire-stage-e-ci/${{ matrix.case }}" \
            --run-id "ci-${{ matrix.case }}"

      - name: Upload Stage E subset artifacts
        if: always() && steps.changes.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: spire-stage-e-${{ matrix.case }}
          path: target/spire-stage-e-ci/${{ matrix.case }}

  pgrx-pg17:
    name: pgrx pg17
    runs-on: ubuntu-24.04
    env:
      PGRX_HOME: /tmp/tqvector_pgrx_home
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-18 postgresql-server-dev-17 clang llvm pkg-config libssl-dev

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Initialize pgrx for pg18 and pg17
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config --pg17 /usr/lib/postgresql/17/bin/pg_config

      - name: pg17 tests
        run: cargo pgrx test pg17

  licenses:
    name: License Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses
        run: cargo deny check licenses

  benchmarks:
    name: Benchmark Regression
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Criterion benchmarks
        run: cargo bench --features bench -- --output-format bencher | tee /tmp/bench_output.txt

      - name: Upload benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: /tmp/bench_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: true

  miri:
    name: Miri
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain with Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Miri tests
        run: cargo +nightly miri test --lib -- miri_
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
