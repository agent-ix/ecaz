name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "37 9 * * *"
    - cron: "37 10 * * 1"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust Checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets --no-default-features --features pg18,bench -- -D warnings

      - name: Unit tests
        run: cargo test

      - name: On-disk fixtures
        run: cargo test --features bench --test on_disk_fixtures

      - name: Upgrade matrix smoke
        run: cargo test --features bench --test upgrade_matrix

      - name: Layout assertions
        run: cargo test --features bench --test size_of_assertions

      - name: Property tests
        run: cargo test --features bench --test proptest_quant --test proptest_page -- --test-threads=1
        env:
          PROPTEST_CASES: 256

      - name: Unsafe audit
        run: bash scripts/check_unsafe_comments.sh

  simd-diff:
    name: SIMD differential (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: avx2
            runner: ubuntu-24.04
          - arch: neon
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: SIMD/scalar differential tests
        run: cargo test --features bench --test simd_diff -- --test-threads=1
        env:
          PROPTEST_CASES: 256

  endian-qemu:
    name: On-disk fixtures under qemu s390x
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    env:
      PGRX_PG_CONFIG_PATH: /usr/lib/postgresql/18/bin/pg_config
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: s390x-unknown-linux-gnu

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install qemu, s390x linker, and PostgreSQL headers
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl --fail --show-error --location \
            --output /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" | \
            sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y gcc-s390x-linux-gnu qemu-user postgresql-server-dev-18 clang llvm pkg-config libssl-dev

      - name: Big-endian on-disk fixture decode
        run: make endian-qemu

  pgrx-pg18:
    name: pgrx pg18
    runs-on: ubuntu-24.04
    env:
      PGRX_HOME: /tmp/tqvector_pgrx_home
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-18 postgresql-server-dev-17 clang llvm pkg-config libssl-dev

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Initialize pgrx for pg18 and pg17
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config --pg17 /usr/lib/postgresql/17/bin/pg_config

      - name: pg18 tests
        run: cargo pgrx test pg18

  recall-cost-gates:
    name: Recall and Cost Gates
    runs-on: ubuntu-24.04
    env:
      PGRX_HOME: /tmp/tqvector_pgrx_home
      PGHOST: /tmp/tqvector_pgrx_home
      PGPORT: "28818"
      PGDATABASE: postgres
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-18 postgresql-server-dev-17 clang llvm pkg-config libssl-dev

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Initialize pgrx for pg18 and pg17
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config --pg17 /usr/lib/postgresql/17/bin/pg_config

      - name: Build CLI and install extension
        run: |
          cargo build -p ecaz-cli
          target/debug/ecaz dev install ecaz-pg-test --pg 18
          cargo pgrx start pg18

      - name: Generate small gate corpus
        run: |
          mkdir -p target/gates/fixtures
          target/debug/ecaz corpus generate --output target/gates/fixtures/gate_corpus.tsv --n 512 --dim 32 --seed 47
          target/debug/ecaz corpus generate --output target/gates/fixtures/gate_queries.tsv --n 64 --dim 32 --seed 48 --start-id 100000 --kind queries

      - name: Load gate fixtures
        run: |
          target/debug/ecaz corpus load --prefix task47_gate_hnsw --profile ec_hnsw --dim 32 --corpus-file target/gates/fixtures/gate_corpus.tsv --queries-file target/gates/fixtures/gate_queries.tsv --m 16
          target/debug/ecaz corpus load --prefix task47_gate_ivf --profile ec_ivf --dim 32 --corpus-file target/gates/fixtures/gate_corpus.tsv --queries-file target/gates/fixtures/gate_queries.tsv --reloption nlists=16 --reloption nprobe=48 --reloption rerank_width=750
          target/debug/ecaz corpus load --prefix task47_gate_diskann --profile ec_diskann --dim 32 --corpus-file target/gates/fixtures/gate_corpus.tsv --queries-file target/gates/fixtures/gate_queries.tsv --reloption graph_degree=16 --reloption build_list_size=64 --reloption list_size=200 --reloption alpha=1.2

      - name: Recall gate
        run: make recall-gate ECAZ_ARGS="--database postgres --host /tmp/tqvector_pgrx_home --port 28818"

      - name: Cost gate
        run: make cost-gate ECAZ_ARGS="--database postgres --host /tmp/tqvector_pgrx_home --port 28818"

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recall-cost-gates
          path: target/gates

  spire-stage-e-subset:
    name: SPIRE Stage E subset (${{ matrix.case }})
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    env:
      PGRX_HOME: /tmp/tqvector_pgrx_home
    strategy:
      fail-fast: false
      matrix:
        case:
          - remote_statement_timeout
          - local_cancel
          - epoch_mismatch
          - version_skew
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect SPIRE surface changes
        id: changes
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > /tmp/changed-files
          if grep -Eq '^(src/am/ec_spire/|sql/|scripts/run_spire_multicluster_.*\.sh)' /tmp/changed-files; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        if: steps.changes.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        if: steps.changes.outputs.run == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL build dependencies
        if: steps.changes.outputs.run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-18 postgresql-server-dev-17 clang llvm pkg-config libssl-dev

      - name: Install cargo-pgrx
        if: steps.changes.outputs.run == 'true'
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Initialize pgrx for pg18 and pg17
        if: steps.changes.outputs.run == 'true'
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config --pg17 /usr/lib/postgresql/17/bin/pg_config

      - name: Build ecaz CLI
        if: steps.changes.outputs.run == 'true'
        run: cargo build -p ecaz-cli

      - name: Run Stage E fault subset case
        if: steps.changes.outputs.run == 'true'
        run: |
          target/debug/ecaz dev spire-multicluster fault-pg18 \
            --case "${{ matrix.case }}" \
            --artifact-dir "target/spire-stage-e-ci/${{ matrix.case }}" \
            --run-id "ci-${{ matrix.case }}"

      - name: Upload Stage E subset artifacts
        if: always() && steps.changes.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: spire-stage-e-${{ matrix.case }}
          path: target/spire-stage-e-ci/${{ matrix.case }}

  pgrx-pg17:
    name: pgrx pg17
    runs-on: ubuntu-24.04
    env:
      PGRX_HOME: /tmp/tqvector_pgrx_home
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-18 postgresql-server-dev-17 clang llvm pkg-config libssl-dev

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Initialize pgrx for pg18 and pg17
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config --pg17 /usr/lib/postgresql/17/bin/pg_config

      - name: pg17 tests
        run: cargo pgrx test pg17

  licenses:
    name: License Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses
        run: cargo deny check licenses

  test-quality-coverage:
    name: Test Quality Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Coverage report
        run: make coverage

      - name: Coverage baseline completeness
        run: make coverage-baseline-check

      - name: Changed files
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > target/quality/changed-files.txt

      - name: Coverage delta gate
        run: |
          if [ -f target/quality/changed-files.txt ]; then
            scripts/check_coverage_delta.sh target/quality/coverage/summary.txt fixtures/quality/coverage-baseline.tsv target/quality/changed-files.txt
          else
            scripts/check_coverage_delta.sh target/quality/coverage/summary.txt fixtures/quality/coverage-baseline.tsv
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-quality-coverage
          path: target/quality/coverage

  test-quality-mutants:
    name: Mutation Testing
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '37 10 * * 1'
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Mutation sweep
        run: make mutants-full MUTANTS_JOBS=2

      - name: Upload mutation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-quality-mutants
          path: target/quality/mutants

  test-quality-flake-hunt:
    name: Flake Hunt
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '37 9 * * *'
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Seed sweep
        run: make flake-hunt FLAKE_HUNT_SEEDS=8 FLAKE_HUNT_FUZZ_SECONDS=10

  benchmarks:
    name: Benchmark Regression
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Criterion benchmarks
        run: cargo bench --features bench -- --output-format bencher | tee /tmp/bench_output.txt

      - name: Upload benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: /tmp/bench_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: true

  miri:
    name: Miri
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain with Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Miri tests
        run: cargo +nightly miri test --lib -- miri_
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
