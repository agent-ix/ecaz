[build]
# Default for cross-compile / non-Linux / non-macOS targets only.
# NOTE: cargo's rustflags do NOT merge across tables — a matching
# [target.<cfg>] table fully replaces [build].rustflags. So target-cpu
# must be repeated in every target table below, or it silently gets
# dropped (which is what was happening: Linux + macOS builds were
# compiling for generic aarch64/x86-64, not the host ISA).
rustflags = ["-C", "target-cpu=native"]

[target.'cfg(target_os="linux")']
# target-cpu=native: Neoverse-V2 on Graviton 4, native ISA on dev hosts.
# link-arg: pgrx test binaries link extension code directly; Postgres
# symbols resolve only when the extension is loaded by the backend at
# runtime.
rustflags = [
    "-C", "target-cpu=native",
    "-C", "link-arg=-Wl,--unresolved-symbols=ignore-all",
]

[target.'cfg(target_os="macos")']
# target-cpu=native: Apple Silicon ISA features (i8mm, dotprod, fp16,
# bf16) on M-series; native x86_64 features on Intel Macs.
# link-args: pgrx extension dylibs reference PostgreSQL backend symbols
# that resolve only when Postgres loads the extension.
rustflags = [
    "-C", "target-cpu=native",
    "-C", "link-arg=-undefined",
    "-C", "link-arg=dynamic_lookup",
]

[alias]
lint = "clippy --all-targets --all-features -- -D warnings"
fmt-check = "fmt --all -- --check"
