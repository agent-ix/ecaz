[build]
# Native SIMD for AVX2 (turbo-quant uses it; safe to require on dev machines)
# Remove or change to "x86-64" for cross-compilation targets.
rustflags = ["-C", "target-cpu=native"]

[target.'cfg(target_os="linux")']
# pgrx test binaries link extension code directly; Postgres symbols resolve only
# when the extension is loaded by the backend at runtime.
rustflags = ["-C", "link-arg=-Wl,--unresolved-symbols=ignore-all"]

[target.'cfg(target_os="macos")']
# pgrx extension dylibs reference PostgreSQL backend symbols that resolve only
# when Postgres loads the extension.
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

[alias]
lint = "clippy --all-targets --all-features -- -D warnings"
fmt-check = "fmt --all -- --check"
